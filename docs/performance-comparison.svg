<svg width="960" height="640" viewBox="0 0 960 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">go-parquet-tools performance comparison</title>
  <desc id="desc">Bar chart comparing median CLI latency for Go and Python parquet-tools across show, csv, and inspect commands.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4EFE6"/>
      <stop offset="1" stop-color="#E7F0EA"/>
    </linearGradient>
    <linearGradient id="goBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="pyBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D97706"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#16322A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="640" rx="28" fill="url(#bg)"/>
  <rect x="28" y="28" width="904" height="584" rx="24" fill="#FFFDF8" filter="url(#shadow)"/>

  <text x="72" y="92" fill="#16322A" font-size="34" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    Go vs Python parquet-tools
  </text>
  <text x="72" y="126" fill="#4B635A" font-size="18" font-family="'Trebuchet MS', Verdana, sans-serif">
    Median CLI latency on a 100,000-row synthetic Parquet dataset
  </text>

  <rect x="72" y="152" width="16" height="16" rx="4" fill="url(#goBar)"/>
  <text x="98" y="165" fill="#24433A" font-size="16" font-family="'Trebuchet MS', Verdana, sans-serif">Go implementation</text>
  <rect x="250" y="152" width="16" height="16" rx="4" fill="url(#pyBar)"/>
  <text x="276" y="165" fill="#6B4A1C" font-size="16" font-family="'Trebuchet MS', Verdana, sans-serif">Python parquet-tools 0.2.16</text>

  <text x="72" y="206" fill="#6A7E75" font-size="14" font-family="'Trebuchet MS', Verdana, sans-serif">Lower is better</text>

  <line x1="220" y1="248" x2="860" y2="248" stroke="#E5DDD0" stroke-width="1"/>
  <line x1="220" y1="360" x2="860" y2="360" stroke="#E5DDD0" stroke-width="1"/>
  <line x1="220" y1="472" x2="860" y2="472" stroke="#E5DDD0" stroke-width="1"/>

  <text x="72" y="258" fill="#16322A" font-size="26" font-family="Georgia, 'Times New Roman', serif" font-weight="700">show</text>
  <text x="72" y="280" fill="#63786E" font-size="15" font-family="'Trebuchet MS', Verdana, sans-serif">First 100 rows</text>
  <rect x="220" y="224" width="12" height="24" rx="6" fill="url(#goBar)"/>
  <text x="244" y="242" fill="#16322A" font-size="16" font-family="'Trebuchet MS', Verdana, sans-serif">0.0145s</text>
  <rect x="220" y="256" width="640" height="24" rx="12" fill="url(#pyBar)"/>
  <text x="872" y="274" fill="#6B4A1C" font-size="16" font-family="'Trebuchet MS', Verdana, sans-serif" text-anchor="end">0.7777s</text>
  <text x="220" y="304" fill="#0F766E" font-size="18" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="700">53.53x faster</text>

  <text x="72" y="370" fill="#16322A" font-size="26" font-family="Georgia, 'Times New Roman', serif" font-weight="700">csv</text>
  <text x="72" y="392" fill="#63786E" font-size="15" font-family="'Trebuchet MS', Verdana, sans-serif">First 10,000 rows</text>
  <rect x="220" y="336" width="21" height="24" rx="6" fill="url(#goBar)"/>
  <text x="253" y="354" fill="#16322A" font-size="16" font-family="'Trebuchet MS', Verdana, sans-serif">0.0274s</text>
  <rect x="220" y="368" width="696" height="24" rx="12" fill="url(#pyBar)"/>
  <text x="872" y="386" fill="#6B4A1C" font-size="16" font-family="'Trebuchet MS', Verdana, sans-serif" text-anchor="end">0.8468s</text>
  <text x="220" y="416" fill="#0F766E" font-size="18" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="700">30.95x faster</text>

  <text x="72" y="482" fill="#16322A" font-size="26" font-family="Georgia, 'Times New Roman', serif" font-weight="700">inspect</text>
  <text x="72" y="504" fill="#63786E" font-size="15" font-family="'Trebuchet MS', Verdana, sans-serif">File metadata</text>
  <rect x="220" y="448" width="10" height="24" rx="6" fill="url(#goBar)"/>
  <text x="242" y="466" fill="#16322A" font-size="16" font-family="'Trebuchet MS', Verdana, sans-serif">0.0114s</text>
  <rect x="220" y="480" width="624" height="24" rx="12" fill="url(#pyBar)"/>
  <text x="872" y="498" fill="#6B4A1C" font-size="16" font-family="'Trebuchet MS', Verdana, sans-serif" text-anchor="end">0.7589s</text>
  <text x="220" y="528" fill="#0F766E" font-size="18" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="700">66.83x faster</text>

  <text x="72" y="578" fill="#6A7E75" font-size="13" font-family="'Trebuchet MS', Verdana, sans-serif">
    Source: docs/performance-report.md | Median wall-clock latency | Measured on 2026-03-30
  </text>
</svg>
